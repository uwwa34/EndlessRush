<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
        user-scalable=no, viewport-fit=cover" />
  <title>🏃 Endless Rush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background:#E8F5E9;
      overflow:hidden;
      touch-action:none;
      font-family:'Nunito','Segoe UI Emoji',sans-serif;
    }
    #wrapper {
      position:absolute;
      width:390px; height:720px;
      transform-origin:top left;
    }
    canvas {
      display:block;
      width:390px; height:720px;
      image-rendering:pixelated;
      cursor:pointer;
    }
    #loading {
      position:absolute; inset:0;
      background:#F1F8E9;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      gap:14px; z-index:10;
    }
    .load-logo {
      font-size:64px;
      width:80px; height:80px;
      display:flex; align-items:center; justify-content:center;
      animation:loadBounce 0.9s infinite ease-in-out;
    }
    .load-logo img {
      width:80px; height:80px;
      object-fit:contain;
      image-rendering:pixelated;
    }
    .load-title {
      font-family:'Fredoka One',cursive;
      color:#1B3A1F; font-size:30px; letter-spacing:1px;
    }
    .load-sub { color:#388E3C; font-size:14px; }
    #load-bar-bg {
      width:260px; height:10px;
      background:#C8E6C9; border-radius:5px; overflow:hidden;
    }
    #load-bar {
      height:100%; width:0%;
      background:linear-gradient(90deg,#66BB6A,#4CAF50);
      border-radius:5px; transition:width 0.12s ease;
    }
    #load-msg { font-size:12px; color:#388E3C; min-height:18px; text-align:center; }
    @keyframes loadBounce {
      0%,100% { transform:translateY(0) rotate(-5deg); }
      50%     { transform:translateY(-14px) rotate(5deg); }
    }
    #scanlines {
      position:absolute; inset:0; pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 3px,
        rgba(0,0,0,0.018) 3px,rgba(0,0,0,0.018) 4px);
      z-index:1;
    }
  </style>
</head>
<body>

<script>
// iOS Audio Unlock — ต้องลงทะเบียนก่อน user gesture แรก
(function(){
  var unlocked = false;
  function unlock() {
    // ไม่ทำอะไรถ้า page ไม่ active
    if (document.hidden) return;
    if (!unlocked) {
      unlocked = true;
      try {
        var AC = window.AudioContext || window.webkitAudioContext;
        if (AC) {
          var ctx = new AC();
          window._audioCtx = ctx;
          var buf = ctx.createBuffer(1,1,22050);
          var src = ctx.createBufferSource();
          src.buffer = buf; src.connect(ctx.destination); src.start(0);
          ctx.resume();
        }
      } catch(e) {}
      if (window._game && window._game._unlockAudio) {
        window._game._unlockAudio();
      }
    }
    // resume BGM เฉพาะตอน page visible เท่านั้น
    if (!document.hidden && window._bgmEl && window._bgmEl.paused) {
      window._bgmEl.play().catch(function(){});
    }
  }
  var evs = ['touchstart','touchend','pointerdown','mousedown','click','keydown'];
  evs.forEach(function(ev){
    document.addEventListener(ev, unlock, {passive:true});
  });
})();
</script>

<div id="wrapper">
  <canvas id="gameCanvas" width="390" height="720"></canvas>
  <div id="scanlines"></div>
  <div id="loading">
    <div id="load-logo" class="load-logo"><img src="assets/images/player.png" alt="player"/></div>
    <div class="load-title">ENDLESS RUSH</div>
    <div class="load-sub">วิ่ง · กระโดด · ไปให้ไกลที่สุด!</div>
    <div id="load-bar-bg"><div id="load-bar"></div></div>
    <div id="load-msg">กำลังเตรียมการผจญภัย...</div>
  </div>
</div>

<script src="js/settings.js"></script>
<script src="js/player.js"></script>
<script src="js/world.js"></script>
<script src="js/enemy.js"></script>
<script src="js/boulder.js"></script>
<script src="js/items.js"></script>
<script src="js/boss.js"></script>
<script src="js/hud.js"></script>
<script src="js/ranking.js"></script>
<script src="js/game.js"></script>

<script>
// ── Canvas scaling ─────────────────────────────────
(function(){
  var w=document.getElementById('wrapper');
  function r(){
    var s=Math.min(window.innerWidth/390,window.innerHeight/720);
    w.style.transform='scale('+s+')';
    w.style.left=((window.innerWidth-390*s)/2)+'px';
    w.style.top=((window.innerHeight-720*s)/2)+'px';
  }
  window.addEventListener('resize',r); r();
})();

// ── Loaders ────────────────────────────────────────
function setBar(p,m){
  document.getElementById('load-bar').style.width=p+'%';
  if(m) document.getElementById('load-msg').textContent=m;
}
function loadImg(src){
  return new Promise(function(res){
    var i=new Image();
    i.onload=function(){res(i);}; i.onerror=function(){res(null);};
    i.src=src;
  });
}
function loadSnd(src, isBGM){
  if (isBGM) {
    // BGM ใช้ Audio element (loop ได้ง่าย)
    return new Promise(function(res){
      var a = new Audio();
      a.preload = 'auto';
      a.src = src;
      setTimeout(function(){ res(a); }, 100);
    });
  }
  // SFX ใช้ fetch → ArrayBuffer → decode ผ่าน Web Audio API
  // reliable กว่า cloneNode บน iOS มาก
  return fetch(src)
    .then(function(r){ return r.arrayBuffer(); })
    .then(function(buf){
      return { _sfxBuf: buf, _src: src };   // เก็บ buffer ไว้ decode ตอนเล่น
    })
    .catch(function(){
      // fallback: Audio element ถ้า fetch ไม่ได้
      var a = new Audio(); a.src = src; return a;
    });
}

// ── Boot ───────────────────────────────────────────
(async function(){
  try {
    setBar(5,'เริ่มต้น...');
    var canvas=document.getElementById('gameCanvas');
    var game=new Game(canvas);

    // โหลดรูป
    setBar(15,'โหลดรูปภาพ...');
    var ikeys=Object.keys(ASSET_IMAGES);
    var ires=await Promise.all(ikeys.map(function(k){return loadImg(ASSET_IMAGES[k]);}));
    var images={};
    ikeys.forEach(function(k,i){if(ires[i])images[k]=ires[i];});

    // โหลดเสียง — BGM ใช้ Audio element, SFX ใช้ Web Audio Buffer
    setBar(50,'โหลดเสียง...');
    var skeys=Object.keys(ASSET_SOUNDS);
    var bgmKeys = ['bgm','boss'];   // BGM files
    var sres=await Promise.all(skeys.map(function(k){
      return loadSnd(ASSET_SOUNDS[k], bgmKeys.indexOf(k) >= 0);
    }));
    var sounds={};
    skeys.forEach(function(k,i){if(sres[i])sounds[k]=sres[i];});

    setBar(100,'พร้อมแล้ว! 🌟');
    game.setImages(images);
    game.setSounds(sounds);

    await new Promise(function(r){setTimeout(r,250);});

    var ld=document.getElementById('loading');
    ld.style.transition='opacity 0.3s';
    ld.style.opacity='0';
    setTimeout(function(){ld.style.display='none';},300);

    game.start();

  } catch(err) {
    // แสดง error บนหน้า loading เพื่อ debug ง่าย
    document.getElementById('load-msg').style.color='#C84A00';
    document.getElementById('load-msg').textContent='ERROR: '+err.message;
    document.getElementById('load-bar').style.background='#E84A00';
    console.error('[EndlessRush Boot Error]', err);
  }
})();
</script>
</body>
</html>
